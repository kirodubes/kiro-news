# kiro-news sources — one per line:  id|type|url|display name|verify
#   type   : rss | json
#   verify : none   (display-only, trust HTTPS — for feeds we don't own)
#            signed (minisign-verified against /usr/share/kiro-news/kiro.pub
#                    before display — REQUIRED for Kiro's own feed)
# Lines starting with # and blank lines are ignored.

arch|rss|https://archlinux.org/feeds/news/|Arch Linux News|none

# Kiro's own channel — inert until the keypair is generated and the feed
# is published + signed. The client skips it cleanly while kiro.pub is absent.
kiro|json|https://kiroproject.be/news/feed.json|Kiro News|signed
