# kiro-news sources — one per line:  id|type|url|display name|verify
#   type   : rss | json
#   verify : none   (display-only, trust HTTPS — for feeds we don't own)
#            signed (minisign-verified against /usr/share/kiro-news/kiro.pub
#                    before display — REQUIRED for Kiro's own feed)
# Lines starting with # and blank lines are ignored.

arch|rss|https://archlinux.org/feeds/news/|Arch Linux News|none

# Kiro's own channel — a JSON feed shipped INSIDE this package at
# /usr/share/kiro-news/feed.json. Updated by updating the package (edit the
# file, rebuild, publish); users receive it on their next pacman -Syu. No
# website, no network, no separate signing — the package is the trust boundary.
kiro|json|/usr/share/kiro-news/feed.json|Kiro News|none
